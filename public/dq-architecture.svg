<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dq-arch-title">
  <title id="dq-arch-title">Architettura Data Quality Framework</title>
  <defs>
    <marker id="dq-arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a1a1aa" />
    </marker>
  </defs>

  <rect x="40" y="30" width="240" height="110" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" />
  <text x="60" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#27272a">Catalogo Controlli DQ</text>
  <text x="60" y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">Puntuali · Intra-entità · Cross-entità</text>
  <text x="60" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">Dimensioni DQ: Validità, Completezza,</text>
  <text x="60" y="116" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">Consistenza, Accuratezza, Unicità, Tempestività</text>

  <path d="M160,140 L160,172" stroke="#a1a1aa" stroke-width="1.5" fill="none" marker-end="url(#dq-arrowhead)" />
  <text x="172" y="160" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">mappatura su</text>

  <rect x="40" y="180" width="720" height="100" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" />
  <text x="60" y="206" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#27272a">Controlli per Dominio</text>
  <text x="60" y="228" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">Istanze del catalogo applicate a tabelle/campi fisici, per data product:</text>

  <rect x="60" y="240" width="120" height="30" rx="6" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5" />
  <text x="120" y="260" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#27272a">GEC</text>

  <rect x="200" y="240" width="120" height="30" rx="6" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5" />
  <text x="260" y="260" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#27272a">GPD</text>

  <rect x="340" y="240" width="120" height="30" rx="6" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5" />
  <text x="400" y="260" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#27272a">BIZ</text>

  <rect x="480" y="240" width="120" height="30" rx="6" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5" />
  <text x="540" y="260" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#27272a">FDR</text>

  <rect x="620" y="240" width="120" height="30" rx="6" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5" />
  <text x="680" y="260" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#27272a">Wallet</text>

  <path d="M400,280 L400,322" stroke="#a1a1aa" stroke-width="1.5" fill="none" marker-end="url(#dq-arrowhead)" />
  <text x="412" y="305" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">controlli applicati su</text>

  <rect x="40" y="330" width="720" height="60" rx="8" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5" />
  <text x="60" y="356" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#27272a">Data Lake</text>
  <text x="60" y="376" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#71717a">Bronze (ingestion) → Silver (validazione) → Gold (metriche DQ esponibili)</text>
</svg>
